# fly.toml — apt-chat backend (FastAPI)
# Build context = directory containing this file (= monorepo root)

app = "apt-chat"
primary_region = "nrt"

[build]
  dockerfile = "deploy/Dockerfile.server"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
