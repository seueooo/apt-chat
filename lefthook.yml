pre-commit:
  parallel: true
  commands:
    biome:
      glob: "apps/web/**/*.{ts,tsx,json}"
      run: pnpm biome check --write {staged_files}
      stage_fixed: true
    ruff-check:
      root: "apps/api/"
      glob: "*.py"
      run: ruff check {staged_files}
    ruff-format:
      root: "apps/api/"
      glob: "*.py"
      run: ruff format --check {staged_files}
